<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicoAutos - Mensajes</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <!-- NAVBAR -->
    <nav class="navbar">
        <a href="dashboard.html" class="navbar-logo">
            <img src="./img/ImageProy.png" alt="Logo TicoAutos" class="logo-img">
        </a>
        <div class="navbar-right">
            <button class="btn-secondary" onclick="window.location.href='dashboard.html'">Volver al Catalogo</button>
        </div>
    </nav>

    <!-- WHATSAPP-STYLE LAYOUT -->
    <div class="chat-layout">
        <!-- LEFT: Chat list -->
        <div class="chat-sidebar">
            <div class="chat-sidebar-header">
                <h2>Mensajes</h2>
            </div>
            <div class="chat-list" id="chat-list">
                <!-- Injected by messages.js -->
                <div class="chat-empty" style="padding: 40px 20px;">
                    <h3>Cargando chats...</h3>
                </div>
            </div>
        </div>
        <!-- RIGHT: Conversation -->
        <div class="chat-main" id="chat-main">
            <div class="chat-empty">
                <h3>Selecciona una conversacion</h3>
                <p>Elige un chat de la lista para ver los mensajes</p>
            </div>
        </div>
    </div>
    <script src="../src/messages.js"></script>
</body>
</html>
