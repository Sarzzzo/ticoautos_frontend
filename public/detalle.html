<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicoAutos - Detalle de Vehículo</title>
    <link rel="stylesheet" href="./styles.css">
</head>

<body>

    <!-- TOP NAVBAR -->
    <nav class="navbar">
        <a href="dashboard.html" class="navbar-logo">TicoAutos</a>
        <div class="navbar-actions">
            <button class="btn-secondary" onclick="window.location.href='dashboard.html'">Volver al Catálogo</button>
            <button class="btn-secondary" onclick="logout()">Cerrar Sesión</button>
        </div>
    </nav>

    <!-- LOADING MESSAGE -->
    <div id="loading" style="text-align: center; margin-top: 50px; font-size: 20px; font-weight: bold; color: var(--text-muted);">
        Cargando vehículo...
    </div>

    <!-- MAIN BODY -->
    <div class="dashboard-container" id="vehicle-container" style="display: none; flex-direction: column; align-items: center; padding: 40px 20px;">
        
        <!-- VEHICLE INFO -->
        <main class="main-content" style="max-width: 800px; width: 100%;">
            <div style="background: white; border-radius: 15px; padding: 30px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); margin-bottom: 30px;">
                <!-- Temporary image -->
                <div style="width: 100%; height: 300px; background-image: url('https://images.unsplash.com/photo-1533473359331-0135ef1b58bf?auto=format&fit=crop&q=80&w=800'); background-size: cover; background-position: center; border-radius: 10px; margin-bottom: 20px;"></div>
                
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <h2 id="vehicle-title" style="font-size: 32px; color: var(--text-main); margin: 0;">Cargando...</h2>
                    <div id="vehicle-price" style="font-size: 28px; font-weight: 800; color: var(--primary);">$0</div>
                </div>

                <div style="display: flex; gap: 15px; margin-bottom: 20px;">
                    <span id="vehicle-year" style="background: #f3f4f6; padding: 6px 12px; border-radius: 6px; font-weight: bold; color: var(--text-muted);">📅 0000</span>
                    <span id="vehicle-status" style="background: rgba(16, 185, 129, 0.1); color: var(--primary); padding: 6px 12px; border-radius: 6px; font-weight: bold;">Cargando</span>
                    <span id="vehicle-owner" style="background: #f3f4f6; padding: 6px 12px; border-radius: 6px; font-weight: bold; color: var(--text-muted);">👤 Vendedor</span>
                </div>

                <h3 style="margin-bottom: 10px; color: var(--text-main);">Descripción</h3>
                <p id="vehicle-description" style="color: var(--text-muted); line-height: 1.6;">Cargando descripción...</p>
            </div>

            <!-- Q&A SECTION -->
            <div style="background: white; border-radius: 15px; padding: 30px; box-shadow: 0 5px 20px rgba(0,0,0,0.05);">
                <h3 style="font-size: 22px; color: var(--text-main); margin-bottom: 20px;">Preguntas y Respuestas</h3>
                
                <!-- Questions List -->
                <div id="questions-list" style="margin-bottom: 30px;">
                    <!-- Injected dynamically in detail.js -->
                </div>

                <!-- Form to Ask (Only if not owner) -->
                <div id="ask-section" style="display: none;">
                    <h4 style="margin-bottom: 10px; color: var(--text-muted);">Pregúntale al vendedor</h4>
                    <form id="ask-form">
                        <textarea id="question-text" rows="3" required placeholder="Escribe tu pregunta aquí..." style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; resize: none; font-family: inherit; margin-bottom: 15px; box-sizing: border-box;"></textarea>
                        <button type="submit" class="btn-primary" style="padding: 10px 20px; border-radius: 8px;">Enviar Pregunta</button>
                    </form>
                    <div id="ask-message" style="margin-top: 10px;"></div>
                </div>

            </div>
        </main>
    </div>

    <!-- MAIN SCRIPT -->
    <script src="../src/detail.js"></script>
    <script>
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('role');
            window.location.href = '/'; 
        }
    </script>
</body>

</html>
