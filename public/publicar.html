<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicoAutos - Publicar</title>
    <link rel="stylesheet" href="./styles.css">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <a href="dashboard.html" class="navbar-logo">Tico<span>Autos</span></a>
        <div class="navbar-right">
            <button class="btn-secondary" onclick="window.location.href='dashboard.html'">Volver al Inicio</button>
            <button class="btn-secondary" onclick="logout()">Cerrar Sesion</button>
        </div>
    </nav>

    <div style="display: flex; justify-content: center; padding: 50px 20px;">

        <div class="publish-wrapper">
            <!-- Left: Form -->
            <div class="form-area">
                <h2 style="margin-bottom: 10px; font-size: 28px;">Vende tu Vehiculo</h2>
                <p style="margin-bottom: 30px;">Especifica los detalles tecnicos para atraer mas compradores.</p>

                <form id="publish-form">
                    <div style="display: flex; gap: 15px; margin-bottom: 18px;">
                        <div class="input-group" style="flex: 1; margin-bottom: 0;">
                            <label>Marca</label>
                            <input type="text" id="brand" placeholder="Ej: Honda" required
                                style="width: 100%; padding: 12px; border-radius: 8px;">
                        </div>
                        <div class="input-group" style="flex: 1; margin-bottom: 0;">
                            <label>Modelo</label>
                            <input type="text" id="model" placeholder="Ej: Civic" required
                                style="width: 100%; padding: 12px; border-radius: 8px;">
                        </div>
                    </div>

                    <div style="display: flex; gap: 15px; margin-bottom: 18px;">
                        <div class="input-group" style="flex: 1; margin-bottom: 0;">
                            <label>Ano de Fabricacion</label>
                            <input type="number" id="year" placeholder="2020" min="1980" max="2026" required
                                style="width: 100%; padding: 12px; border-radius: 8px;">
                        </div>
                        <div class="input-group" style="flex: 1; margin-bottom: 0;">
                            <label>Precio de Venta ($)</label>
                            <input type="number" id="price" placeholder="12500" min="1" required
                                style="width: 100%; padding: 12px; border-radius: 8px;">
                        </div>
                    </div>

                    <div class="input-group" style="margin-bottom: 22px;">
                        <label>Descripcion del Estado Mecanico e Interior</label>
                        <textarea id="description"
                            placeholder="Ej: Unico dueno, llantas nuevas, mantenimientos al dia..." rows="4"
                            style="width: 100%; padding: 12px; border-radius: 8px; resize: none; font-family: inherit; box-sizing: border-box;"></textarea>
                    </div>

                    <button type="submit" class="btn-primary"
                        style="width: 100%; padding: 14px; font-size: 15px;">Publicar Anuncio</button>

                    <div id="publish-message" style="margin-top: 18px; text-align: center; font-weight: 600; font-size: 14px;"></div>
                </form>
            </div>

            <!-- Right: Photo -->
            <div class="pic-area">
                <div class="upload-overlay">
                    <strong style="font-size: 16px;">Imagen Destacada</strong>
                    <p style="font-size: 13px; margin-top: 6px; color: rgba(255,255,255,0.6);">El sistema asignara una imagen representativa automaticamente.</p>
                </div>
            </div>

        </div>
    </div>

    <script src="../src/publish.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (!localStorage.getItem('token')) {
                alert('Sesion expirada. Regresa al Login.');
                window.location.href = '/';
            }
        });
        function logout() { localStorage.removeItem('token'); window.location.href = '/'; }
    </script>
</body>

</html>
