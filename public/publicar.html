<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicoAutos - Publicar</title>
    <link rel="stylesheet" href="./styles.css">
    <style>
        .publish-page {
            display: flex;
            min-height: calc(100vh - 60px);
        }

        .publish-form-side {
            flex: 1;
            padding: 50px 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .publish-image-side {
            flex: 1;
            background: var(--bg-surface);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-left: 1px solid var(--border-color);
            padding: 40px;
            position: relative;
        }

        .image-upload-zone {
            width: 100%;
            max-width: 500px;
            height: 350px;
            border: 2px dashed rgba(124, 58, 237, 0.4);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            background: var(--bg-dark);
            overflow: hidden;
        }

        .image-upload-zone:hover {
            border-color: var(--primary);
            background: rgba(124, 58, 237, 0.05);
        }

        .image-upload-zone.has-image {
            border-style: solid;
            border-color: var(--accent);
        }

        .image-upload-zone img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 14px;
        }

        .upload-placeholder {
            text-align: center;
            color: var(--text-muted);
        }

        .upload-placeholder svg {
            margin-bottom: 16px;
            color: var(--primary);
        }

        .upload-placeholder h3 {
            font-size: 18px;
            color: var(--text-white);
            margin-bottom: 8px;
        }

        .upload-placeholder p {
            font-size: 14px;
        }

        .publish-input {
            width: 100%;
            padding: 13px 16px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            background: var(--bg-surface);
            color: var(--text-white);
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }

        .publish-input::placeholder {
            color: #475569;
        }

        .publish-input:focus {
            border-color: var(--primary);
        }

        .publish-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .field-row {
            display: flex;
            gap: 16px;
            margin-bottom: 18px;
        }

        .field-row .field {
            flex: 1;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <a href="dashboard.html" class="navbar-logo">Tico<span>Autos</span></a>
        <div class="navbar-right">
            <button class="btn-secondary" onclick="window.location.href='dashboard.html'">Volver al Inicio</button>
            <button class="btn-secondary" onclick="logout()">Cerrar Sesion</button>
        </div>
    </nav>

    <!-- FULL SCREEN PUBLISH -->
    <div class="publish-page">

        <!-- LEFT: FORM -->
        <div class="publish-form-side">
            <h1 style="font-size: 36px; font-weight: 800; margin-bottom: 8px; color: var(--text-white);">Vende tu Vehiculo</h1>
            <p style="color: var(--text-muted); margin-bottom: 36px; font-size: 16px;">Completa los datos y sube una foto para atraer compradores.</p>

            <form id="publish-form">
                <div class="field-row">
                    <div class="field">
                        <label class="publish-label">Marca</label>
                        <input type="text" id="brand" placeholder="Ej: Toyota" required class="publish-input">
                    </div>
                    <div class="field">
                        <label class="publish-label">Modelo</label>
                        <input type="text" id="model" placeholder="Ej: Corolla" required class="publish-input">
                    </div>
                </div>

                <div class="field-row">
                    <div class="field">
                        <label class="publish-label">Ano</label>
                        <input type="number" id="year" placeholder="2024" min="1980" max="2026" required class="publish-input">
                    </div>
                    <div class="field">
                        <label class="publish-label">Precio ($)</label>
                        <input type="number" id="price" placeholder="15000" min="1" required class="publish-input">
                    </div>
                </div>

                <div style="margin-bottom: 24px;">
                    <label class="publish-label">Descripcion</label>
                    <textarea id="description" rows="4" placeholder="Estado mecanico, kilometraje, extras..."
                        class="publish-input" style="resize: none; font-family: inherit;"></textarea>
                </div>

                <button type="submit" class="btn-primary" style="width: 100%; padding: 16px; font-size: 16px; border-radius: 10px;">
                    Publicar Anuncio
                </button>

                <div id="publish-message" style="margin-top: 18px; text-align: center; font-weight: 600; font-size: 14px;"></div>
            </form>
        </div>

        <!-- RIGHT: IMAGE UPLOAD -->
        <div class="publish-image-side">
            <h3 style="color: var(--text-white); margin-bottom: 20px; font-size: 20px;">Foto del Vehiculo</h3>

            <div class="image-upload-zone" id="upload-zone" onclick="document.getElementById('image-input').click()">
                <div class="upload-placeholder" id="upload-placeholder">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
                        <polyline points="21 15 16 10 5 21"/>
                    </svg>
                    <h3>Haz clic para subir una imagen</h3>
                    <p>JPG, PNG o WEBP (max 5MB)</p>
                </div>
                <img id="image-preview" style="display: none;" alt="Preview">
            </div>

            <input type="file" id="image-input" accept="image/jpeg,image/png,image/webp" style="display: none;">
            <p style="color: var(--text-muted); font-size: 13px; margin-top: 16px; text-align: center;">La imagen aparecera en el catalogo junto a tu anuncio.</p>
        </div>
    </div>

    <script src="../src/publish.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (!localStorage.getItem('token')) {
                alert('Sesion expirada. Regresa al Login.');
                window.location.href = '/';
            }
        });
        function logout() { localStorage.removeItem('token'); window.location.href = '/'; }
    </script>
</body>

</html>
