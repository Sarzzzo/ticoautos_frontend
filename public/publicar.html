<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicoAutos - Publicar</title>
    <link rel="stylesheet" href="./styles.css">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <a href="dashboard.html" class="navbar-logo">
            <img src="./img/ImageProy.png" alt="Logo TicoAutos" class="logo-img">
        </a>
        <div class="navbar-center">
            <span class="navbar-link" onclick="window.location.href='dashboard.html'">Volver al Catalogo</span>
        </div>
        <div class="navbar-right">
            <div id="auth-nav" style="display: flex; align-items: center; gap: 16px;">
                <div class="user-avatar" onclick="logout()" title="Cerrar Sesion">U</div>
            </div>
        </div>
    </nav>

    <div class="publish-page">
        <!-- LEFT: FORM SIDE -->
        <div class="publish-form-side">
            <h2 style="font-size: 32px; font-weight: 800; margin-bottom: 32px;">Publicar un Nuevo Vehículo</h2>
            
            <form id="publish-form">
                <div class="field-row">
                    <div class="field">
                        <label class="publish-label">Marca</label>
                        <input type="text" id="brand" class="publish-input" placeholder="Ej: Toyota" required>
                    </div>
                    <div class="field">
                        <label class="publish-label">Modelo</label>
                        <input type="text" id="model" class="publish-input" placeholder="Ej: Corolla" required>
                    </div>
                </div>

                <div class="field-row">
                    <div class="field">
                        <label class="publish-label">Año</label>
                        <input type="number" id="year" class="publish-input" placeholder="2024" required>
                    </div>
                    <div class="field">
                        <label class="publish-label">Precio (₡)</label>
                        <input type="number" id="price" class="publish-input" placeholder="15000000" required>
                    </div>
                </div>

                <div style="margin-bottom: 32px;">
                    <label class="publish-label">Descripción</label>
                    <textarea id="description" class="publish-input" style="height: 120px; resize: none;" placeholder="Describe las características principales del vehículo..." required></textarea>
                </div>

                <button type="submit" class="btn-primary" style="width: 100%; padding: 18px;">Publicar Anuncio</button>
            </form>
            
            <div id="publish-message" class="message" style="margin-top: 24px;"></div>
        </div>

        <!-- RIGHT: IMAGE UPLOAD SIDE -->
        <div class="publish-image-side">
            <label class="publish-label" style="align-self: flex-start; margin-bottom: 20px;">Foto del Vehículo</label>
            <div class="image-upload-zone" id="upload-zone" onclick="document.getElementById('image-input').click()">
                <div id="upload-placeholder" style="display: flex; flex-direction: column; align-items: center; gap: 12px; color: var(--text-muted);">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                    <span style="font-weight: 600;">Haz clic para subir imagen</span>
                    <span style="font-size: 13px; opacity: 0.7;">Formatos: JPG, PNG, WEBP</span>
                </div>
                <img id="image-preview" src="" alt="Vista previa" style="display: none;">
            </div>
            <input type="file" id="image-input" style="display: none;" accept="image/*">
            
            <p style="margin-top: 24px; color: var(--text-muted); font-size: 14px; text-align: center; max-width: 400px;">
                Asegúrate de que la foto sea clara y muestre bien el estado del vehículo para atraer a más compradores.
            </p>
        </div>
    </div>

    <script src="../src/publish.js"></script>
    <script>
        // Check authentication on load
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/';

        function logout() {
            localStorage.removeItem('token');
            window.location.href = '/';
        }
    </script>
</body>

</html>
