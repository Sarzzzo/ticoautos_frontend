<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicoAutos - Publicar</title>
    <link rel="stylesheet" href="./styles.css">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <a href="dashboard.html" class="navbar-logo">
            <img src="../img/ImageProy.png" alt="Logo TicoAutos" class="logo-img">
            Tico<span>Autos</span>
        </a>
        <div class="navbar-center">
            <span class="navbar-link" onclick="window.location.href='dashboard.html'">Volver al Catalogo</span>
        </div>
        <div class="navbar-right">
            <div id="auth-nav" style="display: none; align-items: center; gap: 16px;">
                <div class="user-avatar" onclick="logout()" title="Cerrar Sesion">U</div>
            </div>
            <div id="noauth-nav" style="display: none; align-items: center; gap: 12px;">
                <button class="btn-primary" onclick="window.location.href='/'">Iniciar Sesion</button>
            </div>
        </div>
    </nav>
    <div class="auth-page">
        <div class="auth-form-side">
            <div class="auth-logo">
                <img src="../img/ImageProy.png" alt="Logo TicoAutos" class="logo-img">
                Tico<span>Autos</span>
            </div>
            <h2>Publicar Vehículo</h2>
            <form id="publish-form">
                <input type="text" id="brand" placeholder="Marca" required><br>
                <input type="text" id="model" placeholder="Modelo" required><br>
                <input type="number" id="year" placeholder="Año" required><br>
                <input type="number" id="price" placeholder="Precio (₡)" required><br>
                <textarea id="description" placeholder="Descripción" required></textarea><br>
                <button type="submit" class="btn-primary">Publicar</button>
            </form>
        </div>
    </div>

    <script src="../src/publish.js"></script>
</body>

</html>
