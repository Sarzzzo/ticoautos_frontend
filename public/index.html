<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicoAutos - Acceso</title>
    <!-- Estilos exclusivos para el login -->
    <style>
        :root {
            --primary: #10b981;
            /* Verde esmeralda (Tesla Vibe) */
            --primary-hover: #059669;
            --bg-color: #f4f7f6;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100%;
            background-color: white;
            /* Panel izquierdo limpio */
            color: var(--text-main);
        }

        .split-container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* LADO IZQUIERDO: FORMULARIO */
        .left-side {
            width: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            box-sizing: border-box;
            background: white;
            position: relative;
        }

        .form-wrapper {
            width: 100%;
            max-width: 400px;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 40px;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        h2 {
            font-size: 36px;
            margin-bottom: 10px;
            color: var(--text-main);
        }

        p.subtitle {
            color: var(--text-muted);
            margin-bottom: 40px;
            font-size: 16px;
        }

        .tabs {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .tab-btn {
            background: none;
            border: none;
            font-size: 16px;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            padding: 10px 0;
            position: relative;
        }

        .tab-btn.active {
            color: var(--primary);
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            border-radius: 5px;
            background-color: var(--primary);
        }

        .form-section {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .form-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .input-group input {
            width: 100%;
            padding: 14px 15px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 15px;
            outline: none;
            transition: all 0.3s;
        }

        .input-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
        }

        button.submit-btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            margin-top: 15px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.25);
        }

        button.submit-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.35);
        }

        .message {
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
            min-height: 20px;
            font-weight: 500;
        }

        .error {
            color: #dc2626;
        }

        .success {
            color: var(--primary);
        }

        /* LADO DERECHO: ARTE MAGISTRAL */
        .right-side {
            width: 50%;
            background: linear-gradient(135deg, #10b981 0%, #047857 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* Glassmorphism Flotante */
        .glass-panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            width: 65%;
            height: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
            position: relative;
            z-index: 2;
        }

        .glass-panel h3 {
            color: white;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .glass-panel p {
            color: rgba(255, 255, 255, 0.85);
            font-size: 16px;
            text-align: center;
            max-width: 80%;
            line-height: 1.6;
        }

        /* Animación del Carrito (GTA vibe) */
        .car-container {
            font-size: 90px;
            animation: float 4s ease-in-out infinite;
            margin-top: -40px;
            margin-bottom: 20px;
            filter: drop-shadow(0 20px 15px rgba(0, 0, 0, 0.3));
        }

        @keyframes float {
            0% {
                transform: translateY(0px) rotate(0deg);
            }

            50% {
                transform: translateY(-15px) rotate(2deg);
            }

            100% {
                transform: translateY(0px) rotate(0deg);
            }
        }

        /* Burbujas decorativas abstractas (Estética Eco) */
        .floating-element {
            position: absolute;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: orbital 8s ease-in-out infinite alternate;
            z-index: 1;
        }

        .el-1 {
            width: 80px;
            height: 80px;
            top: 15%;
            left: 15%;
        }

        .el-2 {
            width: 140px;
            height: 140px;
            bottom: 10%;
            right: -5%;
            animation-duration: 12s;
        }

        .el-3 {
            width: 40px;
            height: 40px;
            top: 40%;
            right: 20%;
            animation-duration: 6s;
        }

        @keyframes orbital {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(30px, -40px) scale(1.1);
            }
        }

        /* Responsividad: Ocultar el arte en teléfonos para que entre el formulario */
        @media (max-width: 800px) {
            .split-container {
                flex-direction: column;
            }

            .left-side {
                width: 100%;
                height: 100vh;
            }

            .right-side {
                display: none;
            }
        }
    </style>
</head>

<body>

    <div class="split-container">

        <!-- LADO IZQUIERDO: FORMULARIO BLANCO LIMPIO -->
        <div class="left-side">
            <!-- Contenedor general del form -->
            <div class="form-wrapper">
                <div class="logo">🚙 TicoAutos</div>

                <h2>¡Bienvenido de vuelta!</h2>
                <p class="subtitle">Ingresa tus credenciales para continuar.</p>

                <div class="tabs">
                    <button class="tab-btn active" onclick="switchTab('login')">Iniciar Sesión</button>
                    <button class="tab-btn" onclick="switchTab('register')">Registrarse</button>
                </div>

                <!-- LOGIN -->
                <div id="login-section" class="form-section active">
                    <form id="login-form">
                        <div class="input-group">
                            <label for="login-username">Usuario</label>
                            <input type="text" id="login-username" placeholder="Madrigal2026" required>
                        </div>
                        <div class="input-group">
                            <label for="login-password">Contraseña</label>
                            <input type="password" id="login-password" placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="submit-btn">Ingresar</button>
                    </form>
                </div>

                <!-- REGISTER -->
                <div id="register-section" class="form-section">
                    <form id="register-form">
                        <div class="input-group">
                            <label for="register-username">Usuario</label>
                            <input type="text" id="register-username" placeholder="Tu nombre único" required>
                        </div>
                        <div class="input-group">
                            <label for="register-email">Correo Electrónico</label>
                            <input type="email" id="register-email" placeholder="tu@correo.com" required>
                        </div>
                        <div class="input-group">
                            <label for="register-password">Contraseña</label>
                            <input type="password" id="register-password" placeholder="Mínimo 6 caracteres" required>
                        </div>
                        <button type="submit" class="submit-btn">Crear Cuenta</button>
                    </form>
                </div>

                <div id="status-message" class="message"></div>
            </div>
        </div>

        <!-- LADO DERECHO: ARTE VERDE ESMERALDA (GLASSMORPHISM) -->
        <div class="right-side">
            <div class="floating-element el-1"></div>
            <div class="floating-element el-2"></div>
            <div class="floating-element el-3"></div>

            <div class="glass-panel">
                <div class="car-container">🚘💨</div>
                <h3>Movilidad Premium</h3>
                <p>Descubre el ecosistema automotriz más seguro e inteligente de Costa Rica. Tecnología y diseño a tu
                    alcance.</p>
            </div>
        </div>

    </div>

    <!-- Conectamos la misma lógica que ya habías programado -->
    <script src="../src/app.js"></script>

</body>

</html>
