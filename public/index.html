<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicoAutos</title>
    <link rel="stylesheet" href="./login.css">
</head>
<body>
    <div class="new-auth-wrapper">
        <!-- LEFT: BRANDING (gradient matching reference) -->
        <div class="new-auth-brand">
            <div class="brand-content">
                <h1>Welcome to<br>TicoAutos</h1>
                <p>La plataforma automotriz más avanzada del país. Encuentra o vende tu auto sin intermediarios, pura velocidad.</p>
            </div>
            <!-- Decorative shapes matching the reference -->
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
            <div class="shape shape-3"></div>
            <div class="shape shape-4"></div>
        </div>

        <!-- RIGHT: FORM (Clean white background) -->
        <div class="new-auth-form-container">
            <div class="new-auth-form-box">
                <div class="auth-logo-center">
                    <img src="./img/ImageProy.png" alt="Logo TicoAutos">
                </div>
                
                <div class="new-tabs">
                    <button class="tab-btn active" onclick="switchTab('login')">Ingresar</button>
                    <button class="tab-btn" onclick="switchTab('register')">Registro</button>
                </div>

                <!-- LOGIN -->
                <div id="login-section" class="form-section active">
                    <h2 class="form-title">USER LOGIN</h2>
                    <form id="login-form">
                        <div class="new-input-group">
                            <span class="icon">👤</span>
                            <input type="text" id="login-username" placeholder="Usuario o Correo" required>
                        </div>
                        <div class="new-input-group">
                            <span class="icon">🔒</span>
                            <input type="password" id="login-password" placeholder="Contraseña" required>
                        </div>
                        <div class="form-options">
                            <label><input type="checkbox" checked> Remember me</label>
                        </div>
                        <button type="submit" class="btn-gradient">LOGIN</button>
                    </form>
                </div>

                <!-- REGISTER -->
                <div id="register-section" class="form-section">
                    <h2 class="form-title">CREAR CUENTA</h2>
                    <form id="register-form">
                        <div class="new-input-group">
                            <span class="icon">👤</span>
                            <input type="text" id="register-username" placeholder="Usuario" required>
                        </div>
                        <div class="new-input-group">
                            <span class="icon">✉️</span>
                            <input type="email" id="register-email" placeholder="Correo Electrónico" required>
                        </div>
                        <div class="new-input-group">
                            <span class="icon">🔒</span>
                            <input type="password" id="register-password" placeholder="Contraseña (Min 6)" required>
                        </div>
                        <button type="submit" class="btn-gradient">REGISTRARSE</button>
                    </form>
                </div>
                
                <div id="status-message" class="message"></div>
            </div>
        </div>
    </div>

    <script src="../src/app.js"></script>
</body>
</html>
