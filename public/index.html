<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicoAutos</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <div class="auth-page">
        <!-- LEFT: FORM (takes half the screen) -->
        <div class="auth-form-side">
            <div class="auth-logo" style="flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 8px;">
                <img src="./img/ImageProy.png" alt="Logo TicoAutos" class="logo-img-main">
                <span class="logo-title"><span style="color: var(--primary); font-weight: 900;">Tico</span><span style="color: var(--accent); font-weight: 900;">Autos</span></span>
            </div>

            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('login')">Ingresar</button>
                <button class="tab-btn" onclick="switchTab('register')">Crear Cuenta</button>
            </div>

            <!-- LOGIN -->
            <div id="login-section" class="form-section active">
                <form id="login-form">
                    <div class="input-group">
                        <label>Usuario o Correo</label>
                        <input type="text" id="login-username" placeholder="Tu usuario" required>
                    </div>
                    <div class="input-group">
                        <label>Contrasena</label>
                        <input type="password" id="login-password" placeholder="********" required>
                    </div>
                    <button type="submit" class="submit-btn">Ingresar</button>
                </form>
            </div>

            <!-- REGISTER -->
            <div id="register-section" class="form-section">
                <form id="register-form">
                    <div class="input-group">
                        <label>Usuario</label>
                        <input type="text" id="register-username" placeholder="Ej: Juan99" required>
                    </div>
                    <div class="input-group">
                        <label>Correo Electronico</label>
                        <input type="email" id="register-email" placeholder="juan@correo.com" required>
                    </div>
                    <div class="input-group">
                        <label>Contrasena (Min. 6 caracteres)</label>
                        <input type="password" id="register-password" placeholder="Crea una contrasena segura" required>
                    </div>
                    <button type="submit" class="submit-btn">Crear Cuenta</button>
                </form>
            </div>
            <div id="status-message" class="message"></div>
        </div>

        <!-- RIGHT: BRANDING (gradient with blobs) -->
        <div class="auth-brand-side">
            <h1 style="font-size: 44px; font-weight: 900; margin-bottom: 16px; position: relative; z-index: 1;">Encuentra o<br>Vende tu Auto</h1>
            <p style="font-size: 18px; line-height: 1.7; color: rgba(255,255,255,0.6); position: relative; z-index: 1; max-width: 400px;">La plataforma automotriz mas avanzada del pais. Sin intermediarios, pura velocidad.</p>
        </div>
    </div>

    <script src="../src/app.js"></script>
</body>
</html>
