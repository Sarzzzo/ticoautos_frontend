<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicoAutos - Portal</title>
    <style>
        :root {
            --primary: #10b981;
            --primary-hover: #059669;
            --bg-color: #f3f4f6;
            --text-main: #1f2937;
            --border-color: #e5e7eb;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-color);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Modern Card Form */
        .auth-container {
            background: white;
            width: 900px;
            height: 600px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            display: flex;
            overflow: hidden;
        }

        .form-side {
            width: 50%;
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .image-side {
            width: 50%;
            background: linear-gradient(rgba(16, 185, 129, 0.8), rgba(4, 120, 87, 0.9)), url('https://images.unsplash.com/photo-1503376760367-1db5a46be64a?q=80&w=1000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            padding: 40px;
        }

        .logo {
            font-size: 32px;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 30px;
        }

        .tabs {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--border-color);
        }

        .tab-btn {
            background: none;
            border: none;
            font-size: 18px;
            font-weight: 600;
            color: #9ca3af;
            padding-bottom: 10px;
            cursor: pointer;
        }

        .tab-btn.active {
            color: var(--primary);
            border-bottom: 3px solid var(--primary);
            margin-bottom: -2px;
        }

        .form-section {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .form-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 15px;
        }

        .input-group input:focus {
            border-color: var(--primary);
            outline: none;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .submit-btn:hover {
            background: var(--primary-hover);
        }

        .message {
            margin-top: 15px;
            text-align: center;
            min-height: 20px;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <!-- LEFT SIDE: FORM -->
        <div class="form-side">
            <div class="logo">🚙 TicoAutos</div>

            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('login')">Ingresar</button>
                <button class="tab-btn" onclick="switchTab('register')">Crear Cuenta</button>
            </div>

            <!-- LOGIN -->
            <div id="login-section" class="form-section active">
                <form id="login-form">
                    <div class="input-group">
                        <label>Usuario o Correo</label>
                        <input type="text" id="login-username" placeholder="Tu usuario" required>
                    </div>
                    <div class="input-group">
                        <label>Contraseña</label>
                        <input type="password" id="login-password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="submit-btn">Entrar al Catálogo</button>
                </form>
            </div>

            <!-- REGISTER -->
            <div id="register-section" class="form-section">
                <form id="register-form">
                    <div style="display: flex; gap: 15px;">
                        <div class="input-group" style="flex: 1;">
                            <label>Usuario Único</label>
                            <input type="text" id="register-username" placeholder="Ej: Juan99" required>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Correo Electrónico</label>
                        <input type="email" id="register-email" placeholder="juan@correo.com" required>
                    </div>
                    <div class="input-group">
                        <label>Contraseña (Min. 6 caracteres)</label>
                        <input type="password" id="register-password" placeholder="Crea una contraseña segura" required>
                    </div>
                    <button type="submit" class="submit-btn">Comenzar Aventura</button>
                </form>
            </div>
            <div id="status-message" class="message"></div>
        </div>

        <!-- RIGHT SIDE: IMAGE -->
        <div class="image-side">
            <h1 style="font-size: 40px; margin-bottom: 10px;">Encuentra o Vende</h1>
            <p style="font-size: 18px; line-height: 1.5; color: #e5e7eb;">La plataforma automotriz con la tecnología más
                avanzada del país. Sin intermediarios, pura velocidad.</p>
        </div>
    </div>

    <script src="../src/app.js"></script>
</body>

</html>
