<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicoAutos - Catalogo</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <a href="dashboard.html" class="navbar-logo">Tico<span>Autos</span></a>

        <div class="navbar-center">
            <span class="navbar-link active" onclick="window.location.href='dashboard.html'">Inicio</span>
            <span class="navbar-link" id="nav-publish-link" onclick="window.location.href='publicar.html'" style="display:none;">Publicar</span>
        </div>

        <div class="navbar-right">
            <div class="navbar-search">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" id="searchInput" placeholder="Buscar marca o modelo..." onkeydown="if(event.key==='Enter') searchFromNavbar()">
            </div>

            <!-- Authenticated nav -->
            <div id="auth-nav" style="display: none; align-items: center; gap: 16px;">
                <button class="icon-btn" onclick="window.location.href='mensajes.html'" title="Mensajes">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                </button>
                <div class="user-avatar" onclick="logout()" title="Cerrar Sesion">U</div>
            </div>

            <!-- Not authenticated nav -->
            <div id="noauth-nav" style="display: none; align-items: center; gap: 12px;">
                <button class="btn-primary" onclick="window.location.href='/'">Iniciar Sesion</button>
            </div>
        </div>
    </nav>

    <!-- HERO -->
    <section class="hero">
        <h1>Vehiculos en venta,<br><span class="highlight">listos para ti.</span></h1>
        <p>Explora el catalogo automotriz mas completo. Filtra por marca, modelo, precio, Año o estado.</p>
        <div class="hero-actions">
            <button class="btn-primary" onclick="window.location.href='publicar.html'">+ Publicar Anuncio</button>
        </div>
    </section>

    <!-- FILTER BAR (all required filters from enunciado) -->
    <div class="filter-bar">
        <input type="text" id="filterBrand" placeholder="Marca...">
        <input type="text" id="filterModel" placeholder="Modelo...">
        <input type="number" id="minYear" placeholder="Año min...">
        <input type="number" id="maxYear" placeholder="Año max...">
        <input type="number" id="minPrice" placeholder="Precio min...">
        <input type="number" id="maxPrice" placeholder="Precio max...">
        <select id="statusFilter">
            <option value="">Cualquier estado</option>
            <option value="available">Disponible</option>
            <option value="sold">Vendido</option>
        </select>
        <button class="filter-apply" onclick="loadVehicles()">Buscar</button>
    </div>

    <!-- SECTION LABEL -->
    <div class="section-label" id="grid-section">
        <h2>Resultados</h2>
        <span id="resultsCount">Cargando...</span>
    </div>

    <!-- GRID -->
    <div class="vehicles-grid" id="vehiclesGrid"></div>

    <script src="../src/dashboard.js"></script>
    <script>
        function logout() {
            localStorage.removeItem('token');
            window.location.href = '/';
        }

        function searchFromNavbar() {
            const term = document.getElementById('searchInput').value.trim();
            if (term) {
                document.getElementById('filterBrand').value = term;
                loadVehicles();
                document.getElementById('grid-section').scrollIntoView({ behavior: 'smooth' });
            }
        }

        // Show/hide navbar elements based on auth
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('token');
            const authElements = document.getElementById('auth-nav');
            const noAuthElements = document.getElementById('noauth-nav');
            if (token) {
                authElements.style.display = 'flex';
                noAuthElements.style.display = 'none';
                document.getElementById('nav-publish-link').style.display = 'inline';
            } else {
                authElements.style.display = 'none';
                noAuthElements.style.display = 'flex';
            }
        });
    </script>
</body>
</html>
