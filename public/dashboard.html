<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicoAutos - Catalogo</title>
    <link rel="stylesheet" href="./styles.css">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <a href="#" class="navbar-logo">TicoAutos</a>

        <div class="navbar-search">
            <input type="text" id="searchInput" placeholder="Buscar por marca, modelo...">
        </div>

        <div class="navbar-actions">
            <button class="btn-primary" onclick="window.location.href='publicar.html'">+ Publicar Anuncio</button>
            <button class="btn-secondary" onclick="logout()">Cerrar Sesion</button>
        </div>
    </nav>

    <!-- MAIN BODY -->
    <div class="dashboard-container">

        <!-- FILTERS SIDEBAR -->
        <aside class="sidebar">
            <h2>Filtros</h2>

            <div class="filter-group">
                <label>Precio Minimo ($)</label>
                <input type="number" id="minPrice" placeholder="Ej: 5000">
            </div>

            <div class="filter-group">
                <label>Precio Maximo ($)</label>
                <input type="number" id="maxPrice" placeholder="Ej: 50000">
            </div>

            <div class="filter-group">
                <label>Estado</label>
                <select id="statusFilter">
                    <option value="">Cualquiera</option>
                    <option value="available">Disponible</option>
                    <option value="sold">Vendido</option>
                </select>
            </div>

            <button class="btn-primary" style="width: 100%; border-radius: 10px;" onclick="loadVehicles()">Aplicar Filtros</button>
        </aside>

        <!-- VEHICLE LIST -->
        <main class="main-content">
            <div class="results-header">
                <span id="resultsCount">Cargando vehiculos...</span>
            </div>

            <div class="vehicles-grid" id="vehiclesGrid">
                <!-- Injected dynamically by dashboard.js -->
            </div>
        </main>
    </div>

    <script src="../src/dashboard.js"></script>
    <script>
        function logout() { localStorage.removeItem('token'); window.location.href = '/'; }
    </script>
</body>

</html>
